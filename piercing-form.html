<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piercing Form | Way Out</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-label="Piercing customer form page">
      <section class="hero-card form-card">
        <a class="back-link" href="/Wayout-app/piercings.html">← Back to piercings</a>
        <p class="eyebrow" id="piercing-label">piercing form</p>
        <h1 class="page-title">customer</h1>
        <p class="tagline">Enter the customer and jewelry details below.</p>

        <form class="customer-form" id="customer-form">
          <label class="form-field">
            <span>Customer name</span>
            <input name="customerName" type="text" autocomplete="name" required />
          </label>

          <label class="form-field">
            <span>Piercer's name</span>
            <select name="piercerName" required>
              <option value="">Select piercer</option>
              <option value="Bryanna">Bryanna</option>
              <option value="Omarni">Omarni</option>
              <option value="Stet">Stet</option>
              <option value="Kiersten">Kiersten</option>
              <option value="Naila">Naila</option>
              <option value="Ari">Ari</option>
            </select>
          </label>

          <label class="form-field">
            <span>Phone number</span>
            <input name="phone" type="tel" autocomplete="tel" required />
          </label>

          <label class="form-field">
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>

          <label class="form-field">
            <span>Type of jewelry</span>
            <input name="jewelry" type="text" placeholder="Example: hoop, stud, barbell" required />
          </label>

          <label class="form-field">
            <span>Price of piercing</span>
            <input name="piercingPrice" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" required />
          </label>

          <label class="form-field">
            <span>Price of jewelry</span>
            <input name="jewelryPrice" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" required />
          </label>

          <label class="form-field">
            <span>Aftercare</span>
            <select name="aftercare" required>
              <option value="no">No</option>
              <option value="yes">Yes (+$20)</option>
            </select>
          </label>

          <label class="form-field">
            <span>Total price</span>
            <input name="totalPrice" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" readonly />
          </label>

          <div class="form-actions">
            <button class="choice-button submit-button" type="submit">Save info</button>
            <a class="choice-button choice-button--purple" id="consent-link" href="/Wayout-app/consent-form.html">Consent form</a>
            <label class="choice-button camera-button" for="photo-upload">Upload picture</label>
            <input id="photo-upload" class="visually-hidden" name="photo" type="file" accept="image/*" capture="environment" />
          </div>
        </form>

        <div class="photo-preview" id="photo-preview" hidden></div>
        <div class="form-output" id="form-output" hidden></div>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const piercingType = params.get("type") || "piercing";
      const prettyType = piercingType.charAt(0).toUpperCase() + piercingType.slice(1);
      const label = document.querySelector("#piercing-label");
      const form = document.querySelector("#customer-form");
      const output = document.querySelector("#form-output");
      const consentLink = document.querySelector("#consent-link");
      const photoUpload = document.querySelector("#photo-upload");
      const photoPreview = document.querySelector("#photo-preview");

      label.textContent = `${prettyType} piercing form`;
      document.title = `${prettyType} Piercing Form | Way Out`;
      consentLink.href = `/Wayout-app/consent-form.html?type=${encodeURIComponent(piercingType)}`;

      const piercingPriceInput = form.elements.piercingPrice;
      const jewelryPriceInput = form.elements.jewelryPrice;
      const aftercareInput = form.elements.aftercare;
      const totalPriceInput = form.elements.totalPrice;

      function updateTotalPrice() {
        const piercingPrice = Number(piercingPriceInput.value || 0);
        const jewelryPrice = Number(jewelryPriceInput.value || 0);
        const aftercarePrice = aftercareInput.value === "yes" ? 20 : 0;
        totalPriceInput.value = (piercingPrice + jewelryPrice + aftercarePrice).toFixed(2);
      }

      function saveCustomerInfo() {
        updateTotalPrice();
        const data = Object.fromEntries(new FormData(form).entries());
        localStorage.setItem(`wayout-customer-${piercingType}`, JSON.stringify(data));
        return data;
      }

      piercingPriceInput.addEventListener("input", updateTotalPrice);
      jewelryPriceInput.addEventListener("input", updateTotalPrice);
      aftercareInput.addEventListener("change", updateTotalPrice);
      updateTotalPrice();

      photoUpload.addEventListener("change", () => {
        const file = photoUpload.files?.[0];
        if (!file) return;

        const reader = new FileReader();
        reader.addEventListener("load", () => {
          localStorage.setItem(`wayout-photo-${piercingType}`, reader.result);
          photoPreview.hidden = false;
          photoPreview.innerHTML = `
            <h2>Saved picture</h2>
            <img class="consent-image" src="${reader.result}" alt="Uploaded customer picture" />
            <p class="helper-text">Saved on this device for now. Cloud saving will come when backend storage is added.</p>
          `;
        });
        reader.readAsDataURL(file);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const data = saveCustomerInfo();
        const piercingPrice = Number(data.piercingPrice || 0).toFixed(2);
        const jewelryPrice = Number(data.jewelryPrice || 0).toFixed(2);
        const aftercare = data.aftercare === "yes" ? "Yes (+$20)" : "No";
        const totalPrice = Number(data.totalPrice || 0).toFixed(2);

        output.hidden = false;
        output.innerHTML = `
          <h2>Saved info</h2>
          <p><strong>Piercing:</strong> ${prettyType}</p>
          <p><strong>Name:</strong> ${data.customerName}</p>
          <p><strong>Piercer:</strong> ${data.piercerName}</p>
          <p><strong>Phone:</strong> ${data.phone}</p>
          <p><strong>Email:</strong> ${data.email}</p>
          <p><strong>Jewelry:</strong> ${data.jewelry}</p>
          <p><strong>Price of piercing:</strong> $${piercingPrice}</p>
          <p><strong>Price of jewelry:</strong> $${jewelryPrice}</p>
          <p><strong>Aftercare:</strong> ${aftercare}</p>
          <p><strong>Total price:</strong> $${totalPrice}</p>
          <p class="helper-text">Saved on this device for now. Permanent saving will come later when backend storage is added.</p>
        `;
      });
    </script>
  </body>
</html>
